<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoLanguage Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans:wght@400;700&family=Noto+Sans+Bengali:wght@400;700&family=Noto+Sans+Thai+Looped:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; background: #f8fafc; color: #0f172a; }
        .thai-text { font-family: 'Noto Sans Thai Looped', sans-serif; }
        .bengali-text { font-family: 'Noto Sans Bengali', sans-serif; }
        .cyrillic-text { font-family: 'Noto Sans', 'M PLUS Rounded 1c', sans-serif; }
        .mode-card:has(input:checked), label:has(input:checked) .mode-card { border-color: #0f172a; background: #f1f5f9; }
        .opt.correct { border-color: #10b981; background: #d1fae5; color: #064e3b; }
        .opt.wrong { border-color: #ef4444; background: #fee2e2; color: #991b1b; }
        .opt:disabled { cursor: default; }
    </style>
</head>
<body>
    <div class="mx-auto flex min-h-screen max-w-5xl flex-col px-4 py-6">
        <header class="mb-6 flex flex-col gap-3 border-b border-slate-200 pb-5 md:flex-row md:items-end md:justify-between">
            <div>
                <div class="text-sm font-bold uppercase tracking-widest text-slate-400">GeoGuessr language trainer</div>
                <h1 class="mt-1 text-3xl font-extrabold text-slate-950 md:text-4xl">GeoLanguage Quiz</h1>
            </div>
            <a href="thai.html" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-bold text-slate-700 hover:border-slate-500">タイ専用版へ</a>
        </header>

        <main class="flex-1">
            <section id="setup" class="rounded-lg bg-white p-5 shadow-sm ring-1 ring-slate-200 md:p-7">
                <div class="grid gap-5 lg:grid-cols-[1fr_1.4fr]">
                    <div>
                        <label class="mb-2 block text-sm font-bold text-slate-500">教材</label>
                        <div id="dataset-tabs" class="grid gap-2"></div>
                    </div>
                    <div class="rounded-lg bg-slate-50 p-5">
                        <div id="dataset-native" class="text-4xl font-bold text-slate-900"></div>
                        <h2 id="dataset-title" class="mt-2 text-2xl font-extrabold text-slate-950"></h2>
                        <p id="dataset-description" class="mt-2 text-sm font-semibold leading-6 text-slate-500"></p>
                    </div>
                </div>

                <div class="mt-7">
                    <label class="mb-3 block text-sm font-bold text-slate-500">モード</label>
                    <div id="mode-cards" class="grid gap-3 md:grid-cols-2"></div>
                </div>

                <div class="mt-7 grid gap-4 md:grid-cols-2">
                    <div>
                        <label for="count" class="mb-2 block text-sm font-bold text-slate-500">出題数</label>
                        <select id="count" class="w-full rounded-lg border border-slate-300 bg-white p-3 font-bold">
                            <option value="10">10問</option>
                            <option value="20">20問</option>
                            <option value="50">50問</option>
                            <option value="all">全問</option>
                        </select>
                    </div>
                    <div class="flex items-end">
                        <button id="start" class="w-full rounded-lg bg-slate-950 px-5 py-3 text-lg font-extrabold text-white hover:bg-slate-800">スタート</button>
                    </div>
                </div>
            </section>

            <section id="quiz" class="rounded-lg bg-white p-5 shadow-sm ring-1 ring-slate-200 md:p-7" style="display:none;">
                <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
                    <div>
                        <div id="quiz-context" class="text-sm font-bold text-slate-400"></div>
                        <div id="qno" class="text-lg font-extrabold text-slate-900"></div>
                    </div>
                    <div id="score" class="rounded-full bg-slate-100 px-4 py-2 text-sm font-extrabold text-slate-700"></div>
                </div>

                <div class="flex min-h-[210px] items-center justify-center rounded-lg bg-slate-50 p-6 ring-1 ring-slate-200">
                    <div id="prompt"></div>
                </div>

                <div id="options" class="mt-5 grid gap-3 md:grid-cols-2"></div>

                <div id="feedback" class="mt-5 rounded-lg border border-slate-200 bg-white p-5" style="display:none;">
                    <div id="result-label"></div>
                    <p id="answer-line" class="mt-2 text-sm font-bold text-slate-600"></p>
                    <div id="detail-list" class="mt-4 grid gap-3 md:grid-cols-3"></div>
                    <div class="mt-5 flex flex-wrap gap-3">
                        <a id="map-link" href="#" target="_blank" rel="noopener noreferrer" class="hidden rounded-lg border border-blue-300 bg-blue-50 px-5 py-3 font-bold text-blue-700 hover:border-blue-500">Google Mapsで範囲確認</a>
                        <button id="next" class="rounded-lg bg-slate-950 px-5 py-3 font-extrabold text-white hover:bg-slate-800">次へ</button>
                        <button id="back" class="rounded-lg border border-slate-300 px-5 py-3 font-bold text-slate-700 hover:border-slate-500">設定へ</button>
                    </div>
                </div>
            </section>

            <section id="result" class="rounded-lg bg-white p-7 text-center shadow-sm ring-1 ring-slate-200" style="display:none;">
                <div class="text-sm font-bold uppercase tracking-widest text-slate-400">Result</div>
                <div id="final-score" class="mt-2 text-6xl font-extrabold text-slate-950">0</div>
                <div class="mt-6 grid gap-3 md:grid-cols-2">
                    <div class="rounded-lg bg-slate-50 p-5">
                        <div class="text-xs font-bold uppercase tracking-widest text-slate-400">Accuracy</div>
                        <div id="final-accuracy" class="mt-1 text-3xl font-extrabold text-slate-950">0%</div>
                    </div>
                    <div class="rounded-lg bg-slate-50 p-5">
                        <div class="text-xs font-bold uppercase tracking-widest text-slate-400">Correct</div>
                        <div id="final-count" class="mt-1 text-3xl font-extrabold text-slate-950">0 / 0</div>
                    </div>
                </div>
                <button id="retry" class="mt-6 rounded-lg bg-slate-950 px-6 py-3 font-extrabold text-white hover:bg-slate-800">もう一度</button>
            </section>
        </main>
    </div>

    <script src="data-characters.js"></script>
    <script src="data-provinces.js"></script>
    <script src="data-abbreviations.js"></script>
    <script src="data/bengali-characters.js"></script>
    <script src="data/bengali-places.js"></script>
    <script src="data/cyrillic-russian.js"></script>
    <script src="script-datasets.js"></script>
    <script src="scripts-quiz.js"></script>
</body>
</html>
