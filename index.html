<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイ文字・県名クイズ for GeoGuessr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; background-color: #f9fafb; color: #1f2937; }
        .thai-text { font-family: 'Noto Sans Thai', sans-serif; }
        .btn { transition: all 0.2s ease-in-out; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px -1px rgb(0 0 0 / 0.1); }
        .opt.correct { background-color: #d1fae5; border-color: #10b981; color: #064e3b; font-weight: 600; }
        .opt.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .toggle-label input:checked + span { background-color: #0d9488; color: white; border-color: #0d9488; }
        .modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
        .modal-content { transition: transform 0.3s ease; }
    </style>
</head>
<body class="antialiased text-gray-800">

<div class="container mx-auto p-4 max-w-4xl flex flex-col min-h-screen">
    
    <header class="text-center my-6">
        <h1 class="text-4xl md:text-5xl font-bold text-teal-600 flex items-center justify-center gap-3">
                       <span>タイ文字・県名クイズ</span>
        </h1>
        <p class="mt-2 text-lg text-gray-600">ジオゲッサーで使えるタイの知識をクイズで楽しく学ぶ</p>
    </header>

    <main class="flex-grow">
        <section id="setup" class="bg-white rounded-xl shadow-lg p-6 md:p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">クイズ設定</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-gray-700 font-semibold mb-2">モード選択</label>
                    <div class="flex flex-wrap gap-3">
                        <label class="toggle-label"><input type="radio" name="mode" value="consonant_en" class="hidden" checked><span class="cursor-pointer block text-center font-medium py-2 px-4 rounded-full bg-gray-100 text-gray-700 border border-gray-200 transition">Lv1: 子音</span></label>
                        <label class="toggle-label"><input type="radio" name="mode" value="consonant_vowel" class="hidden"><span class="cursor-pointer block text-center font-medium py-2 px-4 rounded-full bg-gray-100 text-gray-700 border border-gray-200 transition">Lv2: 子音＋母音</span></label>
                        <label class="toggle-label"><input type="radio" name="mode" value="full_en" class="hidden"><span class="cursor-pointer block text-center font-medium py-2 px-4 rounded-full bg-gray-100 text-gray-700 border border-gray-200 transition">Lv3: 県名フル</span></label>
                        <label class="toggle-label"><input type="radio" name="mode" value="abbr_en" class="hidden"><span class="cursor-pointer block text-center font-medium py-2 px-4 rounded-full bg-gray-100 text-gray-700 border border-gray-200 transition">Lv4: 県名略語</span></label>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="count" class="block text-gray-700 font-semibold mb-2">出題数</label>
                        <select id="count" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 transition"></select>
                    </div>
                    <div>
                        <label for="limit" class="block text-gray-700 font-semibold mb-2">制限時間 (1問)</label>
                        <select id="limit" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 transition">
                            <option value="0">なし</option>
                            <option value="10">10秒</option>
                            <option value="15" selected>15秒</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="mt-8 text-center">
                <button id="start" class="btn bg-teal-500 text-white font-bold py-3 px-12 rounded-full text-lg hover:bg-teal-600">スタート</button>
            </div>
        </section>

        <section id="quiz" style="display:none;" class="flex flex-col flex-grow">
            <div class="bg-white rounded-xl shadow-lg p-4 sm:p-6 flex flex-col flex-grow">
                <div class="flex justify-between items-center mb-2">
                    <div id="qno" class="font-bold text-teal-600 text-lg"></div>
                    <div id="score" class="font-semibold text-gray-700 text-lg">スコア: 0</div>
                </div>
                <div class="mb-4 h-2.5 bg-gray-200 rounded-full overflow-hidden">
                    <div id="tfill" class="h-full bg-teal-500 transition-all duration-100 ease-linear"></div>
                </div>
                <div class="text-center bg-teal-50 rounded-lg p-4 my-2 flex items-center justify-center" style="min-height: 150px;">
                    <p id="qtext" class="thai-text text-6xl md:text-8xl font-bold text-gray-800"></p>
                </div>
                <div id="opts" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4"></div>
                <div id="next-action" class="mt-4 text-center" style="display:none;">
                    <button id="next-btn" class="btn bg-teal-500 text-white font-bold py-2 px-8 rounded-full text-lg hover:bg-teal-600">次へ</button>
                </div>
                <div id="infobox" class="mt-4" style="display:none;"></div>
            </div>
        </section>

        <section id="result" style="display:none;">
            <div class="bg-white rounded-xl shadow-lg p-6 md:p-8">
                <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">結果発表</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center mb-8">
                    <div class="bg-gray-100 p-4 rounded-lg"><div class="text-gray-600">正解数</div><div id="rcnt" class="text-3xl font-bold text-teal-600">0</div></div>
                    <div class="bg-gray-100 p-4 rounded-lg"><div class="text-gray-600">正答率</div><div id="racc" class="text-3xl font-bold text-teal-600">0%</div></div>
                    <div class="bg-gray-100 p-4 rounded-lg"><div class="text-gray-600">平均解答時間</div><div id="ravg" class="text-3xl font-bold text-teal-600">—</div></div>
                </div>
                <p class="text-center text-gray-500 mb-4">各行をクリックすると、詳しい解説が見られます。</p>
                <div class="overflow-x-auto border border-gray-200 rounded-lg">
                    <table id="rev" class="w-full text-left"></table>
                </div>
                <div class="mt-8 text-center flex flex-wrap justify-center items-center gap-4">
                    <button id="retry" class="btn bg-teal-500 text-white font-bold py-3 px-6 rounded-full hover:bg-teal-600">もう一度挑戦</button>
                    <button id="back" class="btn bg-gray-200 text-gray-700 font-bold py-3 px-6 rounded-full hover:bg-gray-300">設定に戻る</button>
                    <a id="share-btn" href="#" target="_blank" rel="noopener noreferrer" class="btn bg-black text-white font-bold py-3 px-6 rounded-full inline-flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.07-4.425 5.07H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.602.75H12.6ZM10.59 13.75h1.557-1.557L4.543 2.16H3.014l7.577 11.59h0Z"/></svg>
                        <span>スコアをシェア</span>
                    </a>
                </div>
            </div>
        </section>
    </main>
    
    <footer class="text-center text-gray-500 mt-8 py-4">
        <p>&copy; 2025 Thai Quiz App. All Rights Reserved.</p>
    </footer>

</div>

<div id="details-modal" class="modal invisible opacity-0 fixed inset-0 w-full h-full bg-black bg-opacity-70 flex items-center justify-center p-4 z-50">
    <div id="modal-content" class="modal-content transform -translate-y-10 bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] flex flex-col">
        <div class="p-4 border-b flex justify-between items-center">
            <h3 class="text-2xl font-bold text-teal-600">詳細解説</h3>
            <button id="close-modal" class="text-gray-400 hover:text-gray-800 transition">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div id="modal-body" class="p-6 md:p-8 overflow-y-auto"></div>
    </div>
</div>

<script src="data-characters.js" defer></script>
<script src="data-provinces.js" defer></script>
<script src="data-abbreviations.js" defer></script> <script src="quiz.js" defer></script>
</body>
</html>
