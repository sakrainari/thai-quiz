<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoLanguage Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700;800&family=Noto+Sans+Thai+Looped:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest: #2D5A27;
            --maps-blue: #1A73E8;
            --success: #059669;
            --danger: #DC2626;
            --surface: #F8F9FA;
            --ink: #102019;
        }
        body { font-family: 'Noto Sans JP', 'M PLUS Rounded 1c', sans-serif; background: var(--surface); color: var(--ink); }
        .thai-text { font-family: 'Noto Sans Thai Looped', sans-serif; }
        .bengali-text { font-family: 'Noto Sans Bengali', sans-serif; line-height: 1.15; }
        .cyrillic-text { font-family: 'Noto Sans', 'Noto Sans JP', sans-serif; }
        .devanagari-text { font-family: 'Noto Sans Devanagari', 'Noto Sans JP', sans-serif; line-height: 1.15; }
        .app-card { border-radius: 1rem; background: white; box-shadow: 0 18px 45px -28px rgb(45 90 39 / 0.45); }
        .mode-card:has(input:checked), label:has(input:checked) .mode-card { border-color: var(--forest); background: #F0F7ED; }
        .prompt-panel {
            background-color: #F7FAF7;
            background-image: url("data:image/svg+xml,%3Csvg width='180' height='120' viewBox='0 0 180 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%232D5A27' stroke-opacity='.08' stroke-width='1.4'%3E%3Cpath d='M-15 28c32-20 60-20 85 0s54 20 92 0'/%3E%3Cpath d='M-12 58c30-17 58-17 83 0s56 17 95 0'/%3E%3Cpath d='M-10 88c28-15 56-15 82 0s58 15 96 0'/%3E%3Cpath d='M28-18c18 24 18 48 0 72s-18 48 0 84'/%3E%3Cpath d='M108-20c16 26 16 51 0 76s-16 50 0 82'/%3E%3C/g%3E%3C/svg%3E");
        }
        .primary-action { background: var(--forest); color: white; box-shadow: 0 10px 22px -14px rgb(45 90 39 / 0.8); }
        .primary-action:hover { background: #24491f; }
        .secondary-action { border-color: #B7C8B3; color: #24491f; }
        .secondary-action:hover { border-color: var(--forest); background: #F0F7ED; }
        .review-action { background: #F97316; color: white; box-shadow: 0 10px 22px -14px rgb(249 115 22 / 0.8); }
        .review-action:hover { background: #EA580C; }
        .review-action:disabled { background: #FED7AA; color: #9A3412; cursor: not-allowed; box-shadow: none; }
        .map-action { border-color: #AECBFA; background: #E8F0FE; color: var(--maps-blue); }
        .map-action:hover { border-color: var(--maps-blue); background: #DDEBFF; }
        .opt { box-shadow: 0 8px 22px -20px rgb(45 90 39 / 0.55); }
        .opt.correct { border-color: var(--success); background: #D1FAE5; color: #064E3B; }
        .opt.wrong { border-color: var(--danger); background: #FEE2E2; color: #991B1B; }
        .opt:disabled { cursor: default; transform: none; }
    </style>
</head>
<body>
    <div class="mx-auto flex min-h-screen max-w-5xl flex-col px-4 py-6">
        <header class="mb-6 flex flex-col gap-3 border-b border-[#D7E3D3] pb-5 md:flex-row md:items-end md:justify-between">
            <div>
                <div class="text-sm font-bold uppercase tracking-widest text-[#5E7460]">GeoGuessr language trainer</div>
                <h1 class="mt-1 text-3xl font-extrabold text-[#102019] md:text-4xl">GeoLanguage Quiz</h1>
            </div>
            <a href="thai.html" class="secondary-action rounded-lg border bg-white px-4 py-2 text-sm font-bold transition">タイ専用版へ</a>
        </header>

        <main class="flex-1">
            <section id="setup" class="app-card p-5 ring-1 ring-[#DDE8DA] md:p-7">
                <div class="grid gap-5 lg:grid-cols-[1fr_1.4fr]">
                    <div>
                        <label class="mb-2 block text-sm font-bold text-[#5E7460]">教材</label>
                        <div id="dataset-tabs" class="grid gap-2"></div>
                    </div>
                    <div class="rounded-xl bg-[#F0F7ED] p-5">
                        <div id="dataset-native" class="text-4xl font-bold text-[#102019]"></div>
                        <h2 id="dataset-title" class="mt-2 text-2xl font-extrabold text-[#102019]"></h2>
                        <p id="dataset-description" class="mt-2 text-sm font-semibold leading-6 text-[#5E7460]"></p>
                    </div>
                </div>

                <div class="mt-7">
                    <label class="mb-3 block text-sm font-bold text-[#5E7460]">モード</label>
                    <div id="mode-cards" class="grid gap-3 md:grid-cols-2"></div>
                </div>

                <div id="mode-guide" class="mt-5 rounded-xl border border-[#DDE8DA] bg-[#F7FAF7] p-4" style="display:none;"></div>

                <div class="mt-5 rounded-xl border border-orange-200 bg-orange-50 p-4">
                    <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                        <div>
                            <div class="text-sm font-extrabold text-orange-900">再履修モード</div>
                            <div id="review-stock" class="mt-1 text-sm font-bold text-orange-700">現在の復習ストック: 0問</div>
                        </div>
                        <button id="start-review" class="review-action rounded-lg px-5 py-3 font-extrabold transition active:scale-[0.98]" disabled>間違えた問題のみ復習</button>
                    </div>
                </div>

                <div class="mt-7 grid gap-4 md:grid-cols-4">
                    <div>
                        <label for="count" class="mb-2 block text-sm font-bold text-[#5E7460]">出題数</label>
                        <select id="count" class="w-full rounded-lg border border-[#B7C8B3] bg-white p-3 font-bold">
                            <option value="10">10問</option>
                            <option value="20">20問</option>
                            <option value="50">50問</option>
                            <option value="all">全問</option>
                        </select>
                    </div>
                    <div>
                        <label for="time-limit" class="mb-2 block text-sm font-bold text-[#5E7460]">制限時間</label>
                        <select id="time-limit" class="w-full rounded-lg border border-[#B7C8B3] bg-white p-3 font-bold">
                            <option value="0">無制限</option>
                            <option value="15">15秒</option>
                            <option value="10">10秒</option>
                            <option value="5">5秒</option>
                        </select>
                    </div>
                    <label class="flex cursor-pointer items-center gap-3 rounded-lg border border-[#B7C8B3] bg-white p-3 transition hover:border-[#2D5A27]">
                        <input id="hard-mode" type="checkbox" class="h-5 w-5 accent-[#2D5A27]">
                        <span>
                            <span class="block font-extrabold text-[#102019]">ハードモード</span>
                            <span class="block text-xs font-bold text-[#5E7460]">似た選択肢を優先</span>
                        </span>
                    </label>
                    <div class="flex items-end">
                        <button id="start" class="primary-action w-full rounded-lg px-5 py-3 text-lg font-extrabold transition active:scale-[0.98]">スタート</button>
                    </div>
                </div>
            </section>

            <section id="quiz" class="app-card rounded-2xl p-5 shadow-xl ring-1 ring-[#DDE8DA] md:p-7" style="display:none;">
                <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
                    <div>
                        <div id="quiz-context" class="text-sm font-bold text-[#5E7460]"></div>
                        <div id="qno" class="text-lg font-extrabold text-[#102019]"></div>
                        <div id="quiz-badges" class="mt-2 flex flex-wrap gap-2"></div>
                    </div>
                    <div id="score" class="rounded-full bg-[#F0F7ED] px-4 py-2 text-sm font-extrabold text-[#2D5A27]"></div>
                </div>
                <div id="timer-wrap" class="mb-4" style="display:none;">
                    <div class="mb-1 flex items-center justify-between text-xs font-extrabold text-[#5E7460]">
                        <span>Time</span>
                        <span id="timer-label">0.0s</span>
                    </div>
                    <div class="h-2 overflow-hidden rounded-full bg-[#F0F7ED]">
                        <div id="timer-bar" class="h-full rounded-full bg-[#2D5A27] transition-[width] duration-100 ease-linear"></div>
                    </div>
                </div>

                <div class="prompt-panel flex min-h-[210px] items-center justify-center rounded-2xl p-6 ring-1 ring-[#DDE8DA]">
                    <div id="prompt"></div>
                </div>

                <div id="options" class="mt-5 grid gap-3 md:grid-cols-2"></div>

                <div id="feedback" class="mt-5 rounded-xl border border-[#DDE8DA] bg-white p-5" style="display:none;">
                    <div id="result-label"></div>
                    <p id="answer-line" class="mt-2 text-sm font-bold text-[#4D6551]"></p>
                    <div id="detail-list" class="mt-4 grid gap-3 md:grid-cols-3"></div>
                    <div class="mt-5 flex flex-wrap gap-3">
                        <a id="map-link" href="#" target="_blank" rel="noopener noreferrer" class="map-action hidden rounded-lg border px-5 py-3 font-bold transition active:scale-[0.98]">Google Mapsで範囲確認</a>
                        <button id="next" class="primary-action rounded-lg px-5 py-3 font-extrabold transition active:scale-[0.98]">次へ</button>
                        <button id="back" class="secondary-action rounded-lg border px-5 py-3 font-bold transition active:scale-[0.98]">設定へ</button>
                    </div>
                </div>
            </section>

            <section id="result" class="app-card rounded-2xl p-7 text-center shadow-xl ring-1 ring-[#DDE8DA]" style="display:none;">
                <div class="text-sm font-bold uppercase tracking-widest text-[#5E7460]">Result</div>
                <div id="final-score" class="mt-2 text-6xl font-extrabold text-[#102019]">0</div>
                <div class="mt-6 grid gap-3 md:grid-cols-4">
                    <div class="rounded-xl bg-[#F0F7ED] p-5">
                        <div class="text-xs font-bold uppercase tracking-widest text-[#5E7460]">Accuracy</div>
                        <div id="final-accuracy" class="mt-1 text-3xl font-extrabold text-[#102019]">0%</div>
                    </div>
                    <div class="rounded-xl bg-[#F0F7ED] p-5">
                        <div class="text-xs font-bold uppercase tracking-widest text-[#5E7460]">Correct</div>
                        <div id="final-count" class="mt-1 text-3xl font-extrabold text-[#102019]">0 / 0</div>
                    </div>
                    <div class="rounded-xl bg-orange-50 p-5">
                        <div class="text-xs font-bold uppercase tracking-widest text-orange-700">Review Added</div>
                        <div id="final-review-added" class="mt-1 text-3xl font-extrabold text-orange-900">0</div>
                    </div>
                    <div class="rounded-xl bg-emerald-50 p-5">
                        <div class="text-xs font-bold uppercase tracking-widest text-emerald-700">Review Cleared</div>
                        <div id="final-review-cleared" class="mt-1 text-3xl font-extrabold text-emerald-900">0</div>
                    </div>
                </div>
                <button id="retry" class="primary-action mt-6 rounded-lg px-6 py-3 font-extrabold transition active:scale-[0.98]">もう一度</button>
                <button id="review-result" class="review-action mt-6 rounded-lg px-6 py-3 font-extrabold transition active:scale-[0.98]" disabled>間違えた問題を復習する</button>
            </section>
        </main>
    </div>

    <script src="data-characters.js"></script>
    <script src="data-provinces.js"></script>
    <script src="data-abbreviations.js"></script>
    <script src="data/bengali-characters.js"></script>
    <script src="data/bengali-places.js"></script>
    <script src="data/cyrillic-russian.js"></script>
    <script src="data/devanagari-hindi.js"></script>
    <script src="script-datasets.js"></script>
    <script src="scripts-quiz.js"></script>
</body>
</html>
